services:
  postgres:
    image: postgres:17-alpine
    container_name: only-climb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-onlyclimb}
      POSTGRES_USER: ${POSTGRES_USER:-onlyclimb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onlyclimb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onlyclimb} -d ${POSTGRES_DB:-onlyclimb}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: only-climb-postgres-data
