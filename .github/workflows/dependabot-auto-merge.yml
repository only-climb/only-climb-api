# =============================================================================
# Dependabot Auto-Merge — automatically merge safe dependency updates
#
# Merges patch and minor Dependabot PRs once CI (verify.yml) passes.
# Major updates and manual PRs are untouched.
#
# Prerequisite: enable auto-merge in repo settings:
#   Settings → Pull Requests → "Allow auto-merge"
# =============================================================================
name: 🤖 Dependabot Auto-Merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: 🔄 Auto-merge (patch & minor)
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch and minor updates
        if: >
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
          || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
