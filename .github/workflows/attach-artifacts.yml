# =============================================================================
# Attach Artifacts to Release — CD Pipeline
#
# Triggered when a GitHub Release is published (by release-please).
# Builds the JAR, attaches it to the release, builds the Docker image,
# and pushes it to GitHub Container Registry (ghcr.io).
# =============================================================================
name: 🚀 Attach Artifacts

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

env:
  JAVA_DISTRIBUTION: liberica
  JAVA_VERSION: '25'

jobs:
  build-and-attach:
    name: 📦 Build & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup JDK ${{ env.JAVA_VERSION }} (${{ env.JAVA_DISTRIBUTION }})
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build & Test
        run: ./mvnw verify --batch-mode --no-transfer-progress

      - name: Upload surefire test reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

      # -----------------------------------------------------------------------
      # Attach JAR to the GitHub Release
      # -----------------------------------------------------------------------
      - name: Attach JAR to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: target/*.jar
          fail_on_unmatched_files: true

      # -----------------------------------------------------------------------
      # Docker — build image and push to GitHub Container Registry
      # -----------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from git tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
