name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: liberica
          java-version: '25'
          cache: maven

      - name: Build & Test
        run: ./mvnw verify --batch-mode --no-transfer-progress

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

  package:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: liberica
          java-version: '25'
          cache: maven

      - name: Package (skip tests)
        run: ./mvnw package -DskipTests --batch-mode --no-transfer-progress

      - name: Upload JAR
        uses: actions/upload-artifact@v5
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7
