# =============================================================================
# Verify — Continuous Integration Pipeline
#
# Runs on every push/PR to `main` to ensure code quality and test stability.
#   - Pull request  → build, test, package (blocking check for merge)
#   - Push to main  → build, test, package
#
# Jobs run sequentially: build-and-test → package
# =============================================================================
name: 🔍 Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_DISTRIBUTION: liberica
  JAVA_VERSION: '25'

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build & Test — compile, run all tests with Testcontainers
  # ---------------------------------------------------------------------------
  build-and-test:
    name: 🧪 Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup JDK ${{ env.JAVA_VERSION }} (${{ env.JAVA_DISTRIBUTION }})
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Compile, run tests, and verify
        run: ./mvnw verify --batch-mode --no-transfer-progress

      - name: Upload surefire test reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 2. Package — build fat JAR (skips tests, they already passed)
  # ---------------------------------------------------------------------------
  package:
    name: 📦 Package
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup JDK ${{ env.JAVA_VERSION }} (${{ env.JAVA_DISTRIBUTION }})
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build executable JAR
        run: ./mvnw package -DskipTests --batch-mode --no-transfer-progress

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v5
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7
