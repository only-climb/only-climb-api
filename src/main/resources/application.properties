spring.application.name=only-climb-api

# Datasource (override via env vars in real environments)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/onlyclimb}
spring.datasource.username=${DB_USERNAME:onlyclimb}
spring.datasource.password=${DB_PASSWORD:onlyclimb}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - Flyway owns the schema. Hibernate must never alter it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-migration-naming=true

# OpenAPI / Swagger UI (springdoc)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.show-actuator=false

# --- Clerk authentication ---
# Per-environment values live in application-<profile>.properties (e.g.
# application-dev.properties) or in environment variables. The default below
# is a harmless placeholder so the context can start without a Clerk instance;
# any authenticated request will fail until the real JWKS URI is configured.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${CLERK_JWKS_URI:http://localhost/.well-known/jwks.json}
# Optional: enforce the `iss` claim (e.g. https://clerk.your-domain.com).
# Set via environment as `spring.security.oauth2.resourceserver.jwt.issuer-uri` when needed.

# Clerk instance metadata + webhook signing secret (whsec_*) from the Clerk dashboard.
# Backend API secret key (sk_*) is only required for server-to-server calls to api.clerk.com.
onlyclimb.clerk.issuer=${CLERK_ISSUER:}
onlyclimb.clerk.jwks-uri=${CLERK_JWKS_URI:}
onlyclimb.clerk.webhook-signing-secret=${CLERK_WEBHOOK_SECRET:}
onlyclimb.clerk.secret-key=${CLERK_SECRET_KEY:}

# --- Stripe ---
onlyclimb.stripe.api-key=${STRIPE_API_KEY:}
onlyclimb.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
onlyclimb.stripe.portal-return-url=${STRIPE_PORTAL_RETURN_URL:http://localhost:3000/account}
