spring.application.name=only-climb-api

# Datasource (override via env vars in real environments)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/onlyclimb}
spring.datasource.username=${DB_USERNAME:onlyclimb}
spring.datasource.password=${DB_PASSWORD:onlyclimb}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - Flyway owns the schema. Hibernate must never alter it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-migration-naming=true
